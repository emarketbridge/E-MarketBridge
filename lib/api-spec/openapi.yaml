openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: e-MarketBridge API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User operations
  - name: stores
    description: Store operations
  - name: products
    description: Product operations
  - name: orders
    description: Order operations
  - name: payments
    description: Payment operations
  - name: cart
    description: Cart operations
  - name: analytics
    description: Analytics operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  # USERS
  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # STORES
  /stores:
    get:
      operationId: listStores
      tags: [stores]
      summary: List all stores
      responses:
        "200":
          description: List of stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"
    post:
      operationId: createStore
      tags: [stores]
      summary: Create a store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/{id}:
    get:
      operationId: getStore
      tags: [stores]
      summary: Get store by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Store found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "404":
          description: Not found
    patch:
      operationId: updateStore
      tags: [stores]
      summary: Update store
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/my:
    get:
      operationId: getMyStore
      tags: [stores]
      summary: Get the current admin's store
      responses:
        "200":
          description: Store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "404":
          description: No store found

  # PRODUCTS
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products (filterable by category, storeId, search)
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: storeId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/featured:
    get:
      operationId: listFeaturedProducts
      tags: [products]
      summary: Get featured/top products for marketplace homepage
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /stores/{storeId}/products:
    get:
      operationId: listStoreProducts
      tags: [products]
      summary: List products for a specific store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Store products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  # ORDERS
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (buyer sees own, admin sees store orders)
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order (checkout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # PAYMENTS
  /payments:
    post:
      operationId: processPayment
      tags: [payments]
      summary: Process payment for an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "200":
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{orderId}:
    get:
      operationId: getPayment
      tags: [payments]
      summary: Get payment for an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # ANALYTICS (admin)
  /analytics/dashboard:
    get:
      operationId: getDashboardStats
      tags: [analytics]
      summary: Get admin dashboard stats (sales, orders, products, revenue)
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /analytics/sales-by-month:
    get:
      operationId: getSalesByMonth
      tags: [analytics]
      summary: Get monthly sales data for chart
      responses:
        "200":
          description: Monthly sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlySales"

  /analytics/top-products:
    get:
      operationId: getTopProducts
      tags: [analytics]
      summary: Get top-selling products
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # AUTH
    RegisterInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [admin, buyer]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # USERS
    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, buyer]
        storeId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string

    # STORES
    Store:
      type: object
      required: [id, userId, storeName, location, ruralArea, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        storeName:
          type: string
        logo:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        location:
          type: string
        ruralArea:
          type: string
        contactInfo:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    StoreInput:
      type: object
      required: [storeName, location, ruralArea]
      properties:
        storeName:
          type: string
          minLength: 1
        logo:
          type: string
        description:
          type: string
        location:
          type: string
        ruralArea:
          type: string
        contactInfo:
          type: string

    StoreUpdate:
      type: object
      properties:
        storeName:
          type: string
        logo:
          type: string
        description:
          type: string
        location:
          type: string
        ruralArea:
          type: string
        contactInfo:
          type: string

    # PRODUCTS
    Product:
      type: object
      required: [id, storeId, name, price, stock, category, createdAt]
      properties:
        id:
          type: integer
        storeId:
          type: integer
        storeName:
          type: ["string", "null"]
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        stock:
          type: integer
        category:
          type: string
        images:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ProductInput:
      type: object
      required: [name, price, stock, category]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0
        stock:
          type: integer
          minimum: 0
        category:
          type: string
        images:
          type: string

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          minimum: 0
        stock:
          type: integer
          minimum: 0
        category:
          type: string
        images:
          type: string

    # ORDERS
    Order:
      type: object
      required: [id, buyerId, totalAmount, status, shippingAddress, createdAt]
      properties:
        id:
          type: integer
        buyerId:
          type: integer
        buyerName:
          type: ["string", "null"]
        totalAmount:
          type: number
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
        shippingAddress:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time

    OrderItem:
      type: object
      required: [id, orderId, productId, quantity, price]
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        productName:
          type: ["string", "null"]
        quantity:
          type: integer
        price:
          type: number

    OrderInput:
      type: object
      required: [shippingAddress, items, paymentMethod]
      properties:
        shippingAddress:
          type: string
          minLength: 1
        paymentMethod:
          type: string
          enum: [cash_on_delivery, card]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"

    OrderItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          minimum: 1

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]

    # PAYMENTS
    Payment:
      type: object
      required: [id, orderId, paymentMethod, status, createdAt]
      properties:
        id:
          type: integer
        orderId:
          type: integer
        paymentMethod:
          type: string
          enum: [cash_on_delivery, card]
        transactionId:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, completed, failed]
        createdAt:
          type: string
          format: date-time

    PaymentInput:
      type: object
      required: [orderId, paymentMethod]
      properties:
        orderId:
          type: integer
        paymentMethod:
          type: string
          enum: [cash_on_delivery, card]
        cardNumber:
          type: string
        cardExpiry:
          type: string
        cardCvv:
          type: string

    # ANALYTICS
    DashboardStats:
      type: object
      required: [totalSales, totalOrders, totalProducts, totalRevenue, pendingOrders]
      properties:
        totalSales:
          type: integer
        totalOrders:
          type: integer
        totalProducts:
          type: integer
        totalRevenue:
          type: number
        pendingOrders:
          type: integer

    MonthlySales:
      type: object
      required: [month, sales, revenue]
      properties:
        month:
          type: string
        sales:
          type: integer
        revenue:
          type: number

    TopProduct:
      type: object
      required: [productId, name, totalSold, revenue]
      properties:
        productId:
          type: integer
        name:
          type: string
        totalSold:
          type: integer
        revenue:
          type: number
